user www-data;
worker_processes auto;
pid /run/nginx.pid;
error_log /dev/stderr warn;

events {
    worker_connections 1024;
}

http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    access_log /dev/stdout;
    error_log  /dev/stderr warn;

    sendfile       on;
    tcp_nopush     on;
    keepalive_timeout 65;

    # Allow large media uploads (videos up to 100 MB)
    client_max_body_size 100M;

    # Use /tmp for upload buffering — /var/lib/nginx/tmp is not writable on Railway
    client_body_temp_path /tmp/nginx_client_body;
    proxy_temp_path        /tmp/nginx_proxy;
    fastcgi_temp_path      /tmp/nginx_fastcgi;

    gzip on;
    gzip_vary on;
    gzip_types
        text/plain text/css text/javascript
        application/json application/javascript application/x-javascript
        application/xml text/xml image/svg+xml;

    server {
        listen RAILWAY_PORT;
        server_name _;
        root  /var/www/html/public;
        index index.php;

        # SPA fallback: unknown paths -> index.php (Laravel handles routing)
        # Never cache HTML so browsers always get the latest asset hashes after a deploy
        location / {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            try_files $uri $uri/ /index.php?$query_string;
        }

        # PHP-FPM
        location ~ \.php$ {
            fastcgi_pass  127.0.0.1:9000;
            fastcgi_index index.php;
            fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
            include       fastcgi_params;
            fastcgi_read_timeout    300;
            fastcgi_buffers         16 16k;
            fastcgi_buffer_size     32k;
        }

        # Reverb WebSocket proxy
        location /app/ {
            proxy_pass http://127.0.0.1:6001;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
        }

        location /apps/ {
            proxy_pass http://127.0.0.1:6001;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
        }

        # Vite-built assets: versioned filenames, cache forever
        location /build/ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            try_files $uri =404;
        }

        # Block hidden files and .env
        location ~ /\. {
            deny all;
        }
    }
}
