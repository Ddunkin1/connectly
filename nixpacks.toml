# Nixpacks config for Laravel on Railway.
# Laravel must be served from public/ (not project root) so /api/* routes work.
# See: https://nixpacks.com/docs/providers/php

[variables]
NIXPACKS_PHP_ROOT_DIR = "/app/public"
# Front all requests through index.php (Laravel front controller)
NIXPACKS_PHP_FALLBACK_PATH = "/index.php"
